name: Deploy Data Ingestion Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'operations/**'
  
  workflow_run:
    workflows: ["Terraform Production"]
    types:
      - completed

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    outputs:
      skip_push: ${{ steps.check.outputs.skip_push }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUNNING_TERRAFORM=$(gh run list --workflow "Terraform Production" --status in_progress --limit 1 --json databaseId --jq 'length')
          
          if [[ "${{ github.event_name }}" == "push" && "$RUNNING_TERRAFORM" -gt 0 ]]; then
            echo "Terraform is running. Skipping this push-triggered run to wait for workflow_run."
            echo "skip_push=true" >> $GITHUB_OUTPUT
          else
            echo "skip_push=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: gatekeeper
    if: |
      (github.event_name == 'push' && needs.gatekeeper.outputs.skip_push == 'false') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shotrip-prod/shotrip-prod-rag-spotdata-processing
          IMAGE_TAG: latest
        working-directory: ./operations
        run: |
          docker build --provenance=false -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
      
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: shotrip-prod/shotrip-prod-rag-otherdata-processing
          IMAGE_TAG: latest
        working-directory: ./operations
        run: |
          docker build --provenance=false -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
          --function-name shotrip-prod-rag-spotdata-processing \
          --image-uri ${{ steps.login-ecr.outputs.registry }}/shotrip-prod/shotrip-prod-rag-spotdata-processing:latest
      
      - name: Update Lambda function (other data)
        run: |
          aws lambda update-function-code \
          --function-name shotrip-prod-rag-otherdata-processing \
          --image-uri ${{ steps.login-ecr.outputs.registry }}/shotrip-prod/shotrip-prod-rag-otherdata-processing:latest
