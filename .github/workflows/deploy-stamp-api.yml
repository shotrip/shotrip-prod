name: Deploy Stamp API

on:
  push:
    branches:
      - main
    paths:
      - "backend/stamp_api/**"

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  wait-for-terraform:
    name: Wait for Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Check and Wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow "Terraform Production" --status in_progress --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ "$RUN_ID" != "null" ] && [ -n "$RUN_ID" ]; then
            echo "Terraform is currently running (ID: $RUN_ID). Waiting for it to finish..."
            
            gh run watch $RUN_ID
            
            CONCLUSION=$(gh run view $RUN_ID --json conclusion --jq '.conclusion')
            if [ "$CONCLUSION" != "success" ]; then
              echo "Terraform workflow did not succeed (Status: $CONCLUSION). Aborting deployment."
              exit 1
            fi
            echo "Terraform finished successfully. Proceeding!"
          else
            echo "No Terraform runs in progress. Proceeding with deployment."
          fi

  deploy:
    needs: wait-for-terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1
      
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/shotrip-prod/shotrip-prod-stamp:latest ./backend/stamp_api
          docker push ${{ steps.login-ecr.outputs.registry }}/shotrip-prod/shotrip-prod-stamp:latest
      
      - name: Update Task Definition with Dynamic DB Host
        run: |
          DB_HOST=$(aws rds describe-db-clusters \
            --db-cluster-identifier shotrip-prod \
            --query "DBClusters[0].Endpoint" \
            --output text)

          if [ "$DB_HOST" == "None" ] || [ -z "$DB_HOST" ]; then
            echo "Error: DB Cluster 'shotrip-prod' not found."
            exit 1
          fi

          echo "Target DB_HOST: $DB_HOST"

          jq --arg host "$DB_HOST" \
            '(.containerDefinitions[0].environment[] | select(.name == "DB_HOST")).value = $host' \
            backend/stamp_api/app-def.json > backend/stamp_api/app-def.json.tmp
          
          mv backend/stamp_api/app-def.json.tmp backend/stamp_api/app-def.json

      - name: Deploy to ECS
        run: |
          APP_ARN=$(aws ecs register-task-definition --cli-input-json file://backend/stamp_api/app-def.json --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service \
            --cluster shotrip-prod \
            --service shotrip-prod-stamp \
            --task-definition $APP_ARN \
            --force-new-deployment