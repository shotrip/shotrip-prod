name: Deploy Main App to S3/CloudFront

on:
  push:
    branches:
      - main
    paths:
      - 'apps/main-apps/**'
      - 'pnpm-lock.yaml'

permissions:
  id-token: write
  contents: read
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  wait-for-terraform:
    name: Wait for Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Check and Wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 15

          RUN_ID=$(gh run list -R ${{ github.repository }} --workflow "Terraform Production" --status in_progress --limit 1 --json databaseId --jq '.[0].databaseId')
          
          if [ "$RUN_ID" != "null" ] && [ -n "$RUN_ID" ]; then
            echo "Terraform is currently running (ID: $RUN_ID). Waiting for it to finish..."
            
            gh run watch $RUN_ID -R ${{ github.repository }}
            
            CONCLUSION=$(gh run view $RUN_ID -R ${{ github.repository }} --json conclusion --jq '.conclusion')
            if [ "$CONCLUSION" != "success" ]; then
              echo "Terraform workflow did not succeed (Status: $CONCLUSION). Aborting deployment."
              exit 1
            fi
            echo "Terraform finished successfully. Proceeding!"
          else
            echo "No Terraform runs in progress. Proceeding with deployment."
          fi

  deploy:
    needs: wait-for-terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ vars.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ vars.NEXT_PUBLIC_COGNITO_DOMAIN }}
          NEXT_PUBLIC_API_GW_BASE_URL: ${{ vars.NEXT_PUBLIC_API_GW_BASE_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
          NEXT_PUBLIC_BUY_ME_A_COFFEE_URL: ${{ vars.NEXT_PUBLIC_BUY_ME_A_COFFEE_URL }}
          NEXT_PUBLIC_GAS_URL: ${{ vars.NEXT_PUBLIC_GAS_URL }}
          NEXT_PUBLIC_LENS_NAMESPACE: ${{ vars.NEXT_PUBLIC_LENS_NAMESPACE }}
          NEXT_PUBLIC_LENS_TENANT_ID: ${{ vars.NEXT_PUBLIC_LENS_TENANT_ID }}
          NEXT_PUBLIC_LENS_TOKEN: ${{ vars.NEXT_PUBLIC_LENS_TOKEN }}
          NEXT_PUBLIC_PROD_URL: ${{ vars.NEXT_PUBLIC_PROD_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
        run: pnpm --filter frontend_v1 build 

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: S3 Sync
        run: |
          aws s3 sync apps/main-apps/out/ s3://shotrip-prod-web-hosting --delete

      - name: CloudFront Invalidation
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Origins.Items[?DomainName=='shotrip-prod-web-hosting.s3.amazonaws.com']].Id | [0]" \
            --output text)

          if [ "$DISTRIBUTION_ID" != "None" ]; then
            aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
          else
            echo "Error: Target CloudFront distribution not found."
            exit 1
          fi